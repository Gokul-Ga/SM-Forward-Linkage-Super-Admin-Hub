<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { transition: all 0.5s ease; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
  </style>
</head>
<body id="body" class="bg-slate-950 text-white min-h-screen">

  <div id="wrapper" class="flex">
    <!-- Sidebar Navigation -->
    <nav id="nav" class="w-20 flex flex-col items-center py-8 border-r border-white/5">
      <div class="mb-10 text-emerald-500 font-bold">G/</div>
      <div id="nav-links" class="flex flex-col gap-8 text-xl">
        <div>⚙️</div><div>📊</div><div>🗄️</div><div>🗺️</div>
      </div>
    </nav>

    <!-- Main Dynamic Workspace -->
    <main id="workspace" class="flex-1 p-10">
      <header class="flex justify-between mb-10">
        <div>
          <h1 class="text-4xl font-black italic">SUPER ADMIN HUB</h1>
          <p class="text-emerald-500 uppercase tracking-widest text-[10px]">Operational Control Center</p>
        </div>
        <!-- Layout Switcher -->
        <div class="flex gap-1 bg-white/5 p-1 rounded-xl" id="switcher">
          <button onclick="applyLayout('gaming')" class="px-3 py-1 text-[10px] font-bold">GAMING</button>
          <button onclick="applyLayout('finance')" class="px-3 py-1 text-[10px] font-bold">FINANCE</button>
          <button onclick="applyLayout('executive')" class="px-3 py-1 text-[10px] font-bold bg-white text-black rounded-lg">EXECUTIVE</button>
          <button onclick="applyLayout('amoled')" class="px-3 py-1 text-[10px] font-bold">AMOLED</button>
        </div>
      </header>

      <!-- Dynamic Grid -->
      <div id="grid" class="grid grid-cols-12 gap-6">
        <!-- Content will be injected/reordered here by applyLayout -->
      </div>
    </main>
  </div>

  <script>
    function applyLayout(mode) {
      const grid = document.getElementById('grid');
      const nav = document.getElementById('nav');
      
      // Structure logic based on layout type
      if (mode === 'gaming') {
        grid.innerHTML = `
          <div class="card p-10 col-span-12 h-64 flex items-center bg-gradient-to-r from-emerald-900/20">
            <h2 class="text-6xl font-black">GAMING LAYOUT: Sidebar + Large Metrics</h2>
          </div>
        `;
        nav.style.display = 'flex';
      } 
      else if (mode === 'finance') {
        grid.innerHTML = `
          <div class="card p-6 col-span-4 h-96">Finance Chart Widget</div>
          <div class="card p-6 col-span-8 h-96">Large Portfolio Overview</div>
        `;
        nav.style.width = '240px'; // Side-heavy layout
      }
      else if (mode === 'executive') {
        grid.innerHTML = `
          <div class="card p-10 col-span-12">Clean Executive Centralized Metrics</div>
        `;
        nav.style.display = 'none'; // Minimalist
      }
      else if (mode === 'amoled') {
        document.body.className = 'bg-black text-white';
        grid.innerHTML = `<div class="col-span-12 p-20 text-center font-black text-5xl">AMOLED PURE DARK</div>`;
      }
    }
  </script>
</body>
</html>

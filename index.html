<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Layout Switcher */
    .layout-gaming { display: grid; grid-template-columns: 80px 1fr; }
    .layout-grid { display: grid; grid-template-columns: 240px 1fr; }
    .layout-executive { display: block; }
    .layout-amoled { background: #000; color: #fff; }
    
    .card { background: rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(10px); }
  </style>
</head>
<body id="app-container" class="transition-all duration-500 bg-slate-950 text-white min-h-screen">
  
  <div id="layout-wrapper" class="p-6">
    <!-- Dynamic Sidebar (Conditional) -->
    <nav id="sidebar" class="hidden w-20 flex-col items-center gap-6 py-6 border-r border-white/10">
      <div class="p-2 bg-emerald-500 rounded-xl">G/</div>
      <!-- Sidebar Links -->
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="p-8">
      <!-- Overview Console -->
      <header class="mb-10">
        <h1 class="text-3xl font-black italic">SUPER ADMIN HUB</h1>
        <p class="text-emerald-500 uppercase tracking-widest text-xs">Operational Control Center</p>
      </header>

      <!-- Grid Cards -->
      <section id="content-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Central Metric Card -->
        <div class="card p-8 col-span-2 bg-gradient-to-r from-emerald-900/20 to-transparent">
          <h2 class="font-bold">SWM Statewide Forward Linkage</h2>
          <div class="text-5xl font-black mt-4">45,230 <span class="text-xl font-normal">Kg Total Waste</span></div>
        </div>

        <!-- Secondary Widget -->
        <div class="card p-8">
          <h3 class="text-sm opacity-50">Operational Status</h3>
          <div class="text-2xl font-bold mt-2 text-emerald-400">ACTIVE</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Footer with Logo -->
  <footer class="mt-20 p-8 text-center border-t border-white/5">
    <img src="GOKUL GA.png" alt="GA Logo" class="w-16 h-16 mx-auto bg-white p-2 rounded-2xl shadow-2xl mb-4">
    <p class="text-[10px] tracking-widest uppercase opacity-40">Designed and Developed by Gokul GA | Suchitwa Mission</p>
  </footer>

  <script>
    function setLayout(mode) {
      const wrapper = document.getElementById('layout-wrapper');
      const sidebar = document.getElementById('sidebar');
      const container = document.getElementById('app-container');
      
      // Reset
      wrapper.className = 'p-6'; 
      sidebar.classList.add('hidden');
      container.className = 'transition-all duration-500 bg-slate-950';

      if(mode === 'gaming') { 
        wrapper.classList.add('layout-gaming'); 
        sidebar.classList.remove('hidden'); 
      } 
      else if(mode === 'finance') { 
        wrapper.classList.add('layout-grid'); 
        sidebar.classList.remove('hidden'); 
        sidebar.className = 'w-60 p-8 border-r border-white/10';
      }
      else if(mode === 'amoled') {
        container.classList.add('layout-amoled');
      }
    }
  </script>
</body>
</html>

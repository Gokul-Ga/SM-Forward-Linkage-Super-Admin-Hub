<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Global Theme Variables */
    :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; --accent: #38bdf8; }
    .theme-amoled { --bg: #000000; --card: #121212; --text: #e0e0e0; --accent: #10b981; }
    .theme-neuro { --bg: #0a0a0c; --card: rgba(20, 20, 24, 0.8); --text: #ffffff; --accent: #6366f1; }
    
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.5s; }
    .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(10px); }
  </style>
</head>
<body class="p-6">

  <!-- Overview Console -->
  <main class="max-w-7xl mx-auto space-y-8">
    <header class="flex justify-between items-center">
      <h1 class="text-3xl font-black uppercase tracking-tighter">Super Admin Hub</h1>
      <div id="theme-selector" class="flex gap-2">
        <button onclick="setTheme('default')" class="px-4 py-2 bg-slate-800 rounded-lg text-xs">Professional</button>
        <button onclick="setTheme('amoled')" class="px-4 py-2 bg-slate-800 rounded-lg text-xs">Amoled Dark</button>
        <button onclick="setTheme('neuro')" class="px-4 py-2 bg-slate-800 rounded-lg text-xs">Neuro-Fin</button>
      </div>
    </header>

    <!-- Main Central Card -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="md:col-span-2 glass-card p-8 bg-gradient-to-br from-slate-900 to-slate-800">
        <h2 class="text-xl font-bold mb-4">SWM - FL Statewide Dashboard</h2>
        <div class="flex gap-8">
          <div><p class="text-slate-400 text-xs">Total Waste</p><p class="text-2xl font-bold text-sky-400">45,230 Kg</p></div>
          <div><p class="text-slate-400 text-xs">Recyclables</p><p class="text-2xl font-bold text-emerald-400">32,100 Kg</p></div>
          <div><p class="text-slate-400 text-xs">Rejects</p><p class="text-2xl font-bold text-red-400">1,200 Kg</p></div>
        </div> 
      </div>
    </section>

    <!-- Shortcut Grid -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="glass-card p-4 hover:border-accent cursor-pointer transition">
        <div class="w-10 h-10 mb-4 bg-sky-500/20 rounded-full flex items-center justify-center">🌐</div>
        <p class="text-sm font-bold">Master Database</p>
      </div>
      <!-- Repeat for other controllers -->
    </section>
  </main>

  <footer class="mt-12 pt-6 border-t border-white/10 text-center text-xs text-slate-500">
  <div class="mb-3 flex justify-center">
    <img src="GOKUL GA.png" alt="GA Logo" class="w-12 h-12 rounded-lg bg-white p-1 shadow-lg">
  </div>
  <p>Designed and Developed by Gokul GA | Suchitwa Mission</p>
</footer>

  <script>
    function setTheme(theme) {
      document.body.className = theme === 'amoled' ? 'theme-amoled' : theme === 'neuro' ? 'theme-neuro' : '';
    }
  </script>
</body>
</html>
